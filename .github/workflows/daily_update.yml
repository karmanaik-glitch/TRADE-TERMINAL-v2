name: Daily Market Engine Update

# 1. THE TRIGGER: When should this run?
on:
  schedule:
    # This runs at 10:30 AM UTC, which is 4:00 PM IST (After Indian markets close)
    # It runs Monday through Friday.
    - cron: '30 10 * * 1-5'
  
  # This allows you to click a "Run" button manually on GitHub whenever you want
  workflow_dispatch: 

# 2. THE JOB: What should the server do?
jobs:
  update-data:
    runs-on: ubuntu-latest # Spins up a free Linux server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Master Engine (Phase 1 & Phase 2)
        run: python main.py

      - name: Commit and Push Updated CSVs
        # This step saves the new data back to your repository so the HTML can see it
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add terminal_data/*
          git commit -m "Automated Market Data Update" || echo "No changes to commit"
          git push
