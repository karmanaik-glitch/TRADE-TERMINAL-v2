name: Daily Market Engine Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 1. THE TRIGGER: When should this run?
on:
  schedule:
    # 1. MORNING RUN: 10:00 AM IST (4:30 AM UTC)
    - cron: '30 4 * * 1-5'
    
    # 2. MID-DAY RUN: 1:00 PM IST (7:30 AM UTC)
    - cron: '30 7 * * 1-5'
    
    # 3. CLOSING RUN: 3:45 PM IST (10:15 AM UTC)
    - cron: '15 10 * * 1-5'
  
  # This allows you to click a "Run" button manually on GitHub
  workflow_dispatch: 

# REQUIRED: Grants the bot permission to push the updated CSVs back to the repo
permissions:
  contents: write

# 2. THE JOB: What should the server do?
jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Master Engine (Phase 1 & Phase 2)
        run: python main.py

      - name: Commit and Push Updated CSVs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add terminal_data/*
          git commit -m "Automated Market Data Update" || echo "No changes to commit"
          git push
